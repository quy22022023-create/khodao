<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Pro Code Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/javascript/javascript.min.js"></script>

    <style>
        :root { --bg: #282a36; --header: #44475a; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg); font-family: sans-serif; overflow: hidden; }
        
        /* Sidebar/Tab Manager */
        .file-tabs { display: flex; overflow-x: auto; background: var(--header); padding: 5px 5px 0 5px; gap: 2px; }
        .tab { padding: 8px 15px; background: #6272a4; color: white; border-radius: 5px 5px 0 0; cursor: pointer; white-space: nowrap; font-size: 13px; border: none; opacity: 0.7; }
        .tab.active { opacity: 1; background: var(--bg); font-weight: bold; }
        .add-file { padding: 8px 15px; background: #50fa7b; color: black; border-radius: 5px; border: none; font-weight: bold; margin-left: 5px; margin-bottom: 5px; }

        /* Editor Area */
        .main-container { flex: 1; display: flex; flex-direction: column; }
        .CodeMirror { flex: 1; height: auto; font-size: 16px; } /* 16px để tránh zoom iOS */
        
        /* Preview */
        #preview { height: 40%; background: white; border: none; border-top: 4px solid var(--header); }
        
        .controls { padding: 10px; background: var(--header); display: flex; justify-content: flex-end; }
        .run-btn { background: #ff79c6; border: none; padding: 10px 25px; color: white; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="file-tabs" id="tab-container">
    <button class="add-file" onclick="addNewFile()">+ New File</button>
</div>

<div class="main-container">
    <div id="editor-wrapper"></div>
    <div class="controls">
        <button class="run-btn" onclick="runProject()">RUN PROJECT</button>
    </div>
    <iframe id="preview"></iframe>
</div>

<script>
    let files = {
        "index.html": { content: "<h1>Hello iOS!</h1>", mode: "xml" },
        "style.css": { content: "h1 { color: pink; }", mode: "css" },
        "script.js": { content: "console.log('Running...');", mode: "javascript" }
    };
    let activeFile = "index.html";
    let editor;

    // Khởi tạo Editor
    function initEditor() {
        editor = CodeMirror(document.getElementById("editor-wrapper"), {
            lineNumbers: true,
            theme: "dracula",
            mode: files[activeFile].mode,
            value: files[activeFile].content,
            viewportMargin: Infinity,
            tabSize: 2
        });

        editor.on("change", (cm) => {
            files[activeFile].content = cm.getValue();
            localStorage.setItem('project_files', JSON.stringify(files));
        });
    }

    function renderTabs() {
        const container = document.getElementById("tab-container");
        container.querySelectorAll('.tab').forEach(t => t.remove());
        
        Object.keys(files).forEach(fileName => {
            const btn = document.createElement("button");
            btn.className = `tab ${fileName === activeFile ? 'active' : ''}`;
            btn.innerText = fileName;
            btn.onclick = () => switchFile(fileName);
            container.insertBefore(btn, container.firstChild);
        });
    }

    function switchFile(name) {
        activeFile = name;
        editor.setOption("mode", files[name].mode);
        editor.setValue(files[name].content);
        renderTabs();
    }

    function addNewFile() {
        const name = prompt("Nhập tên file (vd: about.html, theme.css):");
        if (!name) return;
        
        let mode = "xml";
        if (name.endsWith(".css")) mode = "css";
        if (name.endsWith(".js")) mode = "javascript";
        
        files[name] = { content: "", mode: mode };
        switchFile(name);
    }

    function runProject() {
        const preview = document.getElementById('preview').contentWindow.document;
        let html = files["index.html"] ? files["index.html"].content : "";
        
        // Tự động tìm các file CSS và JS để nhúng vào index.html
        let css = "";
        let js = "";
        Object.keys(files).forEach(name => {
            if (name.endsWith(".css")) css += `<style>${files[name].content}</style>`;
            if (name.endsWith(".js")) js += `<script>${files[name].content}<\/script>`;
        });

        preview.open();
        preview.write(html + css + js);
        preview.close();
    }

    // Tải dữ liệu cũ nếu có
    const saved = localStorage.getItem('project_files');
    if (saved) files = JSON.parse(saved);

    initEditor();
    renderTabs();
</script>

</body>
</html>
