<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Code Editor">
    <meta name="theme-color" content="#000000">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.PNG">
    <link rel="icon" type="image/png" href="apple-touch-icon.PNG">

    <title>iOS Code Editor Pro - Dark Mode</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closetag.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/selection/active-line.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/javascript-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/css-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/html-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/xml-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/anyword-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <input type="file" id="file-input" multiple style="display: none;" onchange="importFiles(event)">
    <input type="file" id="zip-input" accept=".zip,application/zip" style="display: none;" onchange="importZipProject(event)">

    <header class="header">
        <div class="header-top">
            <button class="btn-icon icon-menu" id="btn-toggle-menu" onclick="toggleMenu()" title="Mở Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            
            <div class="file-selector-wrapper">
                <select id="file-selector" onchange="onFileSelectChange()"></select>
            </div>
            
            <div class="header-actions">
                <button class="btn-icon icon-copy" onclick="copyAllCode()" title="Copy toàn bộ Code">
                    <i class="fa-regular fa-copy"></i>
                </button>
                <button class="btn-icon icon-clear" onclick="clearCurrentCode()" title="Xoá Code">
                    <i class="fa-solid fa-eraser"></i>
                </button>
                <button class="btn-run" onclick="runCode()" title="Chạy code">
                    <i class="fa-solid fa-play"></i>
                </button>
            </div>
        </div>

        <div id="dropdown-menu" class="dropdown-menu">
            <button class="menu-item" onclick="addNewFile()">
                <i class="fa-solid fa-file-circle-plus menu-icon-blue"></i> Thêm file mới
            </button>
            <button class="menu-item" onclick="renameCurrentFile()">
                <i class="fa-solid fa-pen menu-icon-yellow"></i> Đổi tên file
            </button>
            <button class="menu-item" id="btn-open-tools" onclick="openToolsPanel()">
                <i class="fa-solid fa-wand-magic-sparkles menu-icon-blue"></i> Công cụ sửa nhanh
            </button>
            <div class="menu-divider"></div>
            <button class="menu-item" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-file-import menu-icon-purple"></i> Nhập file (Import)
            </button>
            <button class="menu-item" onclick="document.getElementById('zip-input').click()">
                <i class="fa-solid fa-file-zipper menu-icon-yellow"></i> Nhập dự án ZIP
            </button>
            <button class="menu-item" onclick="exportFiles()">
                <i class="fa-solid fa-file-export menu-icon-purple"></i> Xuất file (Export)
            </button>
            <button class="menu-item" onclick="exportProjectZip()">
                <i class="fa-solid fa-box-archive menu-icon-blue"></i> Xuất dự án ZIP
            </button>
            <div class="menu-divider"></div>
            <button class="menu-item text-danger" onclick="deleteCurrentFile()">
                <i class="fa-solid fa-file-circle-xmark"></i> Xoá File này
            </button>
            <button class="menu-item text-danger" onclick="resetAllData()">
                <i class="fa-solid fa-power-off"></i> Khôi phục App
            </button>
        </div>
    </header>
    
    <main class="main-content" onclick="closeMenuOutside(event)">
        <section class="editor-wrapper">
            <textarea id="code-editor"></textarea>
        </section>

        <aside class="keyboard-bar">
            <button class="key-btn" onclick="undoCode()" title="Hoàn tác"><i class="fa-solid fa-rotate-left"></i></button>
            <button class="key-btn" onclick="redoCode()" title="Làm lại"><i class="fa-solid fa-rotate-right"></i></button>
            <button class="key-btn tab-btn" onclick="insertText('Tab')">Tab</button>
            <button class="key-btn" onclick="insertText('{')">{</button>
            <button class="key-btn" onclick="insertText('}')">}</button>
            <button class="key-btn" onclick="insertText('(')">(</button>
            <button class="key-btn" onclick="insertText(')')">)</button>
            <button class="key-btn" onclick="insertText('[')">[</button>
            <button class="key-btn" onclick="insertText(']')">]</button>
            <button class="key-btn" onclick="insertText('<')"><</button>
            <button class="key-btn" onclick="insertText('>')">></button>
            <button class="key-btn" onclick="insertText('=')">=</button>
            <button class="key-btn" onclick="insertText(';')">;</button>
            <button class="key-btn" onclick="insertText('&quot;')">"</button>
            <button class="key-btn" onclick="insertText('\'')">'</button>
            <button class="key-btn" onclick="insertText('/')">/</button>
        </aside>
    </main>
    
    <button class="fab-paste" onclick="pasteFromClipboard()" title="Dán từ Clipboard">
        <i class="fa-solid fa-paste"></i>
    </button>
    
    <div id="preview-overlay">
        <div class="preview-header">
            <div class="preview-title">Kết quả hiển thị</div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button class="btn-console" onclick="toggleConsole()" title="Bật/Tắt Console">
                    <i class="fa-solid fa-terminal"></i> Console
                </button>
                <button class="btn-close-preview" onclick="closePreview()" title="Đóng">
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
        </div>
        <div id="iframe-container" style="flex: 1; display: flex; flex-direction: column;">
            <iframe id="preview"></iframe>
        </div>
        
        <div id="virtual-console" class="virtual-console">
            <div id="console-output"></div>
        </div>
    </div>

    <div id="toast-notification" class="toast" role="status" aria-live="polite">
        Đã sao chép code!
    </div>

    <!-- =====================================================
         VERSION 1.2 - QUICK EDIT TOOLS
         Chỉ bổ sung giao diện, giữ nguyên toàn bộ ID và chức năng cũ
    ====================================================== -->

    <div
        id="tools-backdrop"
        class="tools-backdrop"
        onclick="closeToolsPanel()"
        aria-hidden="true">
    </div>

    <section
        id="tools-panel"
        class="tools-panel"
        aria-label="Công cụ sửa code nhanh"
        aria-hidden="true">

        <div class="tools-panel-handle" aria-hidden="true"></div>

        <div class="tools-panel-header">
            <div class="tools-panel-title-group">
                <span class="tools-panel-icon">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </span>

                <div>
                    <h2 class="tools-panel-title">Công cụ sửa nhanh</h2>
                    <p id="tools-current-file" class="tools-panel-subtitle">
                        File hiện tại
                    </p>
                </div>
            </div>

            <button
                id="btn-close-tools"
                class="tools-close-btn"
                type="button"
                onclick="closeToolsPanel()"
                aria-label="Đóng công cụ">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="tools-panel-body">

            <div id="tools-home-view" class="tools-view active">

                <div class="tools-section-label">Điều hướng code</div>

                <div class="tools-grid">
                    <button
                        id="tool-search-code"
                        class="tools-card"
                        type="button"
                        onclick="openSearchTool()">
                        <span class="tools-card-icon tools-card-icon-blue">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <span class="tools-card-content">
                            <strong>Tìm code</strong>
                            <small>Tìm từ khóa và nhảy tới kết quả</small>
                        </span>
                        <i class="fa-solid fa-chevron-right tools-card-arrow"></i>
                    </button>

                    <button
                        id="tool-go-line"
                        class="tools-card"
                        type="button"
                        onclick="openGoToLineTool()">
                        <span class="tools-card-icon tools-card-icon-orange">
                            <i class="fa-solid fa-location-crosshairs"></i>
                        </span>
                        <span class="tools-card-content">
                            <strong>Đi tới dòng</strong>
                            <small>Nhập số dòng cần mở</small>
                        </span>
                        <i class="fa-solid fa-chevron-right tools-card-arrow"></i>
                    </button>

                    <button
                        id="tool-code-region"
                        class="tools-card"
                        type="button"
                        onclick="openRegionNavigator()">
                        <span class="tools-card-icon tools-card-icon-purple">
                            <i class="fa-solid fa-layer-group"></i>
                        </span>
                        <span class="tools-card-content">
                            <strong>Khu vực code</strong>
                            <small>Đi tới các phần được đánh dấu</small>
                        </span>
                        <i class="fa-solid fa-chevron-right tools-card-arrow"></i>
                    </button>

                    <button
                        id="tool-functions"
                        class="tools-card"
                        type="button"
                        onclick="openFunctionNavigator()">
                        <span class="tools-card-icon tools-card-icon-green">
                            <i class="fa-solid fa-code"></i>
                        </span>
                        <span class="tools-card-content">
                            <strong>Danh sách hàm</strong>
                            <small>Chọn hàm để mở đúng vị trí</small>
                        </span>
                        <i class="fa-solid fa-chevron-right tools-card-arrow"></i>
                    </button>
                </div>

                <div class="tools-section-label tools-section-label-spaced">
                    An toàn dữ liệu
                </div>

                <div class="tools-grid">
                    <button
                        id="tool-safe-delete"
                        class="tools-card"
                        type="button"
                        onclick="openSafeDeleteTool()">
                        <span class="tools-card-icon tools-card-icon-red">
                            <i class="fa-solid fa-scissors"></i>
                        </span>
                        <span class="tools-card-content">
                            <strong>Xóa cụm code an toàn</strong>
                            <small>Chọn, xem trước, backup rồi mới xóa</small>
                        </span>
                        <i class="fa-solid fa-chevron-right tools-card-arrow"></i>
                    </button>

                    <button
                        id="tool-create-backup"
                        class="tools-card"
                        type="button"
                        onclick="createManualBackup()">
                        <span class="tools-card-icon tools-card-icon-yellow">
                            <i class="fa-solid fa-floppy-disk"></i>
                        </span>
                        <span class="tools-card-content">
                            <strong>Tạo bản sao lưu</strong>
                            <small>Lưu toàn bộ file trước khi sửa</small>
                        </span>
                        <i class="fa-solid fa-chevron-right tools-card-arrow"></i>
                    </button>

                    <button
                        id="tool-backup-history"
                        class="tools-card"
                        type="button"
                        onclick="openBackupHistory()">
                        <span class="tools-card-icon tools-card-icon-red">
                            <i class="fa-solid fa-clock-rotate-left"></i>
                        </span>
                        <span class="tools-card-content">
                            <strong>Lịch sử sao lưu</strong>
                            <small>Xem và khôi phục phiên bản cũ</small>
                        </span>
                        <i class="fa-solid fa-chevron-right tools-card-arrow"></i>
                    </button>
                </div>

            </div>

            <div id="tools-detail-view" class="tools-view">
                <div class="tools-detail-header">
                    <button
                        id="btn-tools-back"
                        class="tools-back-btn"
                        type="button"
                        onclick="showToolsHome()">
                        <i class="fa-solid fa-chevron-left"></i>
                        <span>Quay lại</span>
                    </button>

                    <h3 id="tools-detail-title">Công cụ</h3>
                </div>

                <div id="tools-detail-content" class="tools-detail-content">
                    <!-- Nội dung tìm kiếm, danh sách hàm, khu vực code và backup
                         sẽ được script.js tạo động tại đây. -->
                </div>
            </div>

        </div>
    </section>

    <div id="safe-delete-undo" class="safe-delete-undo" role="status" aria-live="polite">
        <div class="safe-delete-undo-message">
            <i class="fa-solid fa-circle-check"></i>
            <span id="safe-delete-undo-text">Đã xóa cụm code</span>
        </div>
        <button type="button" onclick="undoLastSafeDeletion()">
            Hoàn tác
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
