<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Code Editor</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    
    <style>
        :root {
            --bg: #282a36;
            --header: #44475a;
            --tab-active: #6272a4;
            --accent: #50fa7b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Khóa cứng layout vừa màn hình */
        body, html {
            width: 100%; height: 100%;
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: white;
            display: flex; flex-direction: column;
        }
        
        /* Header & Thanh Tabs */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--header); padding: 5px; border-bottom: 1px solid #1e1f29;
        }
        .tab-container {
            display: flex; overflow-x: auto; flex: 1;
            -webkit-overflow-scrolling: touch; /* Vuốt mượt trên iOS */
        }
        .tab-container::-webkit-scrollbar { display: none; }
        .tab {
            padding: 10px 15px; margin-right: 5px; background: transparent;
            border: none; color: #ccc; font-size: 14px; border-radius: 5px;
            white-space: nowrap; cursor: pointer; transition: 0.2s;
        }
        .tab.active { background: var(--tab-active); color: white; font-weight: bold; }
        
        .btn-run {
            background: var(--accent); color: #282a36; border: none;
            padding: 10px 20px; border-radius: 5px; font-weight: bold; margin-left: 10px;
        }
        
        /* Khu vực Code */
        .editor-wrapper { 
            flex: 1; /* Chia 50% màn hình cho code */
            position: relative; 
            display: flex; flex-direction: column; 
        }
        
        /* Ép CodeMirror nằm gọn, chống tràn viền */
        .CodeMirror {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            height: 100% !important; width: 100% !important;
            font-size: 16px; /* QUAN TRỌNG: Ngăn Safari tự động Zoom */
        }
        
        /* Thanh ngăn cách */
        .divider { height: 3px; background: #ff79c6; }
        
        /* Khu vực Preview */
        #preview-container { 
            flex: 1; /* Chia 50% màn hình cho kết quả */
            background: white; display: flex; flex-direction: column; 
        }
        iframe { width: 100%; height: 100%; border: none; flex: 1; }
    </style>
</head>
<body>

    <div class="header">
        <div class="tab-container" id="tabs">
            </div>
        <button class="btn-run" onclick="runCode()">RUN</button>
    </div>
    
    <div class="editor-wrapper">
        <textarea id="code-editor"></textarea>
    </div>
    
    <div class="divider"></div>
    
    <div id="preview-container">
        <iframe id="preview"></iframe>
    </div>

    <script>
        // Hệ thống quản lý File (Mặc định 3 file)
        let files = {
            'index.html': { mode: 'htmlmixed', content: '<h1>Xin chào iOS Editor!</h1>\n<p>Code đã được fix lỗi tràn viền và tự động zoom.</p>' },
            'style.css': { mode: 'css', content: 'body {\n  font-family: sans-serif;\n  text-align: center;\n  padding-top: 50px;\n  background-color: #f4f4f9;\n}\n\nh1 {\n  color: #ff79c6;\n}' },
            'script.js': { mode: 'javascript', content: 'console.log("Hệ thống đã sẵn sàng!");' }
        };
        let currentFile = 'index.html';

        // 1. Khởi tạo CodeMirror
        let editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
            theme: "dracula",
            lineNumbers: true,
            lineWrapping: true, // QUAN TRỌNG: Tự động xuống dòng, sửa lỗi tràn viền ảnh của bạn
            viewportMargin: Infinity,
            indentUnit: 4,
            tabSize: 4
        });

        // 2. Lắng nghe thay đổi code
        editor.on("change", () => {
            files[currentFile].content = editor.getValue();
        });

        // 3. Render hệ thống Tabs (Bao gồm nút + New File)
        function renderTabs() {
            const tabContainer = document.getElementById('tabs');
            tabContainer.innerHTML = '';
            
            // Render danh sách file
            for (let fileName in files) {
                let btn = document.createElement('button');
                btn.className = `tab ${fileName === currentFile ? 'active' : ''}`;
                btn.innerText = fileName;
                btn.onclick = () => switchTab(fileName);
                tabContainer.appendChild(btn);
            }
            
            // Giữ lại nút + New File của bạn
            let newFileBtn = document.createElement('button');
            newFileBtn.className = 'tab';
            newFileBtn.style.color = '#50fa7b'; // Đổi màu xanh cho nổi bật
            newFileBtn.innerText = '+ New File';
            newFileBtn.onclick = addNewFile;
            tabContainer.appendChild(newFileBtn);
        }

        // 4. Chuyển đổi giữa các File
        function switchTab(fileName) {
            currentFile = fileName;
            editor.setOption("mode", files[fileName].mode);
            editor.setValue(files[fileName].content);
            renderTabs();
            
            // Cập nhật lại UI của CodeMirror
            setTimeout(() => editor.refresh(), 10);
        }

        // 5. Thêm File mới
        function addNewFile() {
            let name = prompt("Nhập tên file kèm đuôi (VD: main.css, app.js):");
            if (!name || files[name]) return;
            
            let mode = 'javascript'; // Mặc định
            if (name.endsWith('.html')) mode = 'htmlmixed';
            else if (name.endsWith('.css')) mode = 'css';
            
            files[name] = { mode: mode, content: '' };
            switchTab(name);
        }

        // 6. Trình biên dịch: Gộp HTML, CSS, JS vào iframe
        function runCode() {
            let html = files['index.html'] ? files['index.html'].content : '';
            let css = '';
            let js = '';

            // Tự động tìm và gộp tất cả các file css, js có trong hệ thống
            for (let fileName in files) {
                if (fileName.endsWith('.css')) {
                    css += `<style>${files[fileName].content}</style>\n`;
                }
                if (fileName.endsWith('.js')) {
                    js += `<script>${files[fileName].content}<\/script>\n`;
                }
            }

            let previewFrame = document.getElementById('preview');
            let preview = previewFrame.contentWindow.document;
            
            preview.open();
            preview.write(html + css + js);
            preview.close();
        }

        // Chạy lần đầu tiên khi mở trang
        switchTab('index.html');
        runCode();
    </script>
</body>
</html>
