    <title>iOS Code Editor Pro</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
</head>
<body>

    <input type="file" id="file-input" multiple style="display: none;" onchange="importFiles(event)">

    <div class="header">
        <div class="header-top">
            <button class="btn-reset-app" onclick="resetAllData()" title="Reset App">
                <i class="fa-solid fa-power-off"></i>
            </button>
            
            <div class="file-selector-wrapper">
                <select id="file-selector" onchange="onFileSelectChange()"></select>
            </div>
            
            <button class="btn-run" onclick="runCode()" title="Chạy code">
                <i class="fa-solid fa-play"></i>
            </button>
        </div>
        
        <div class="tools">
            <button class="btn-icon icon-add" onclick="addNewFile()" title="Thêm file"><i class="fa-solid fa-file-circle-plus"></i></button>
            <button class="btn-icon icon-rename" onclick="renameCurrentFile()" title="Đổi tên"><i class="fa-solid fa-pen"></i></button>
            <button class="btn-icon icon-io" onclick="document.getElementById('file-input').click()" title="Nhập nhiều file"><i class="fa-solid fa-file-import"></i></button>
            <button class="btn-icon icon-io" onclick="exportFiles()" title="Xuất file"><i class="fa-solid fa-file-export"></i></button>
            <button class="btn-icon icon-clear" onclick="clearCurrentCode()" title="Xoá Code"><i class="fa-solid fa-eraser"></i></button>
            <button class="btn-icon icon-del" onclick="deleteCurrentFile()" title="Xoá File"><i class="fa-solid fa-file-circle-xmark"></i></button>
        </div>
    </div>
    
    <div class="editor-wrapper">
        <textarea id="code-editor"></textarea>
    </div>
    
    <button class="fab-paste" onclick="pasteFromClipboard()" title="Dán code">
        <i class="fa-solid fa-paste"></i>
    </button>
    
    <div id="preview-overlay">
        <div class="preview-header">
            <div class="preview-title">Kết quả hiển thị</div>
            <button class="btn-close-preview" onclick="closePreview()">
                <i class="fa-solid fa-chevron-down"></i>
            </button>
        </div>
        <iframe id="preview"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
