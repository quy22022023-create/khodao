<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Code Editor Pro</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    
    <style>
        :root {
            --bg: #282a36;
            --header: #44475a;
            --tab-active: #6272a4;
            --accent: #50fa7b;
            --danger: #ff5555;
            --warning: #ffb86c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%;
            overflow: hidden; 
            font-family: -apple-system, sans-serif;
            background: var(--bg); color: white;
            display: flex; flex-direction: column;
        }
        
        /* Header & Thanh Tabs */
        .header {
            display: flex; align-items: center; 
            background: var(--header); padding: 5px; border-bottom: 1px solid #1e1f29;
            flex-wrap: nowrap;
        }
        .tab-container {
            display: flex; overflow-x: auto; flex: 1;
            -webkit-overflow-scrolling: touch;
        }
        .tab-container::-webkit-scrollbar { display: none; }
        
        .tab-group { display: flex; align-items: center; background: #383a59; margin-right: 5px; border-radius: 5px; overflow: hidden; }
        .tab {
            padding: 10px 12px; background: transparent;
            border: none; color: #ccc; font-size: 13px;
            white-space: nowrap; cursor: pointer;
        }
        .tab.active { background: var(--tab-active); color: white; font-weight: bold; }
        
        .btn-del-file {
            background: transparent; color: #ff5555; border: none;
            padding: 10px 8px; font-size: 12px; cursor: pointer;
        }

        .controls { display: flex; gap: 5px; margin-left: 5px; }
        .btn { border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .btn-run { background: var(--accent); color: #282a36; }
        .btn-view { background: #bd93f9; color: white; }
        .btn-clear { background: var(--warning); color: #282a36; }
        .btn-add { background: transparent; color: var(--accent); border: 1px dashed var(--accent); }

        /* Khu vực Code - Mặc định chiếm 100% khi chưa bật View */
        .editor-wrapper { 
            flex: 1; position: relative; 
            display: flex; flex-direction: column; 
            transition: all 0.3s ease;
        }
        
        .CodeMirror {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            height: 100% !important; width: 100% !important;
            font-size: 16px; /* Chặn auto-zoom trên iOS */
        }
        
        /* Khu vực Preview - Có thể ẩn/hiện */
        #preview-container { 
            height: 0; /* Mặc định ẩn đi để hiện editor tràn viền */
            background: white; border-top: 3px solid #ff79c6;
            transition: height 0.3s ease;
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        #preview-container.show { height: 40%; } /* Khi bật sẽ chiếm 40% màn hình */
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="tab-container" id="tabs">
            </div>
        <button class="btn btn-add" onclick="addNewFile()">+ File</button>
        
        <div class="controls">
            <button class="btn btn-clear" onclick="clearCurrentCode()">CLEAR</button>
            <button class="btn btn-view" id="view-toggle" onclick="togglePreview()">VIEW</button>
            <button class="btn btn-run" onclick="runCode()">RUN</button>
        </div>
    </div>
    
    <div class="editor-wrapper">
        <textarea id="code-editor"></textarea>
    </div>
    
    <div id="preview-container">
        <iframe id="preview"></iframe>
    </div>

    <script>
        // Khởi tạo dữ liệu mẫu
        let files = JSON.parse(localStorage.getItem('ios_editor_files')) || {
            'index.html': { mode: 'htmlmixed', content: '<h1 style="text-align:center; padding-top:20px">Trình biên tập Tràn Viền</h1>\n<p style="text-align:center">Nhấn RUN để xem kết quả, VIEW để ẩn/hiện màn hình này.</p>' },
            'style.css': { mode: 'css', content: 'body { background: #f0f0f0; color: #333; }' }
        };
        let currentFile = Object.keys(files)[0] || 'index.html';

        const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
            theme: "dracula",
            lineNumbers: true,
            lineWrapping: true,
            indentUnit: 4,
            tabSize: 4
        });

        editor.on("change", () => {
            if (files[currentFile]) {
                files[currentFile].content = editor.getValue();
                localStorage.setItem('ios_editor_files', JSON.stringify(files));
            }
        });

        function renderTabs() {
            const container = document.getElementById('tabs');
            container.innerHTML = '';
            
            for (let fileName in files) {
                const group = document.createElement('div');
                group.className = 'tab-group';
                
                const btn = document.createElement('button');
                btn.className = `tab ${fileName === currentFile ? 'active' : ''}`;
                btn.innerText = fileName;
                btn.onclick = () => switchTab(fileName);
                
                const del = document.createElement('button');
                del.className = 'btn-del-file';
                del.innerHTML = '✕';
                del.onclick = (e) => { e.stopPropagation(); deleteFile(fileName); };
                
                group.appendChild(btn);
                group.appendChild(del);
                container.appendChild(group);
            }
        }

        function switchTab(fileName) {
            currentFile = fileName;
            editor.setOption("mode", files[fileName].mode);
            editor.setValue(files[fileName].content);
            renderTabs();
            setTimeout(() => editor.refresh(), 50);
        }

        function addNewFile() {
            let name = prompt("Tên file mới (VD: app.js, style.css):");
            if (!name || files[name]) return;
            let mode = name.endsWith('.html') ? 'htmlmixed' : (name.endsWith('.css') ? 'css' : 'javascript');
            files[name] = { mode: mode, content: '' };
            switchTab(name);
        }

        function deleteFile(fileName) {
            if (Object.keys(files).length <= 1) {
                alert("Bạn phải giữ lại ít nhất một file.");
                return;
            }
            if (confirm(`Xoá file ${fileName}?`)) {
                delete files[fileName];
                if (currentFile === fileName) currentFile = Object.keys(files)[0];
                renderTabs();
                switchTab(currentFile);
            }
        }

        function clearCurrentCode() {
            if (confirm("Xoá sạch code trong file hiện tại?")) {
                editor.setValue("");
                files[currentFile].content = "";
            }
        }

        function togglePreview() {
            const container = document.getElementById('preview-container');
            const isShowing = container.classList.toggle('show');
            document.getElementById('view-toggle').style.background = isShowing ? '#50fa7b' : '#bd93f9';
            document.getElementById('view-toggle').style.color = isShowing ? '#282a36' : 'white';
            setTimeout(() => editor.refresh(), 350);
        }

        function runCode() {
            // Tự động bật Preview nếu đang ẩn khi nhấn Run
            document.getElementById('preview-container').classList.add('show');
            document.getElementById('view-toggle').style.background = '#50fa7b';
            
            let html = files['index.html'] ? files['index.html'].content : '';
            let css = '', js = '';

            for (let f in files) {
                if (f.endsWith('.css')) css += `<style>${files[f].content}</style>`;
                if (f.endsWith('.js')) js += `<script>${files[f].content}<\/script>`;
            }

            const preview = document.getElementById('preview').contentWindow.document;
            preview.open();
            preview.write(html + css + js);
            preview.close();
            setTimeout(() => editor.refresh(), 350);
        }

        // Khởi tạo ban đầu
        switchTab(currentFile);
    </script>
</body>
</html>
